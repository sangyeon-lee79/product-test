<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" rx="16" fill="#f0f0f5"/>
  <g transform="translate(40,50)">
    <!-- Syringe body -->
    <rect x="30" y="30" width="80" height="24" rx="4" fill="#a8b8d4"/>
    <rect x="30" y="30" width="40" height="24" rx="4" fill="#8898b4"/>
    <!-- Needle -->
    <rect x="110" y="39" width="20" height="6" rx="1" fill="#c0c8d8"/>
    <!-- Plunger -->
    <rect x="10" y="36" width="22" height="12" rx="2" fill="#b8c8e0"/>
    <!-- Pill -->
    <circle cx="85" cy="80" r="14" fill="#c4a8d4"/>
    <circle cx="85" cy="80" r="14" fill="url(#med_grad)" opacity="0.5"/>
    <!-- Cross mark -->
    <rect x="81" y="72" width="8" height="16" rx="2" fill="white" opacity="0.6"/>
    <rect x="77" y="76" width="16" height="8" rx="2" fill="white" opacity="0.6"/>
  </g>
  <defs>
    <radialGradient id="med_grad" cx="40%" cy="35%">
      <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
