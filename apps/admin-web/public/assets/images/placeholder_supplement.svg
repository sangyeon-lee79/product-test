<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" rx="16" fill="#f0f0f5"/>
  <g transform="translate(50,55)">
    <!-- Capsule -->
    <rect x="0" y="20" width="100" height="40" rx="20" fill="#a8b8d4"/>
    <rect x="50" y="20" width="50" height="40" rx="20" fill="#8898b4"/>
    <!-- Shine -->
    <ellipse cx="30" cy="32" rx="12" ry="4" fill="#c0d0e8" opacity="0.6"/>
    <!-- Small pill -->
    <circle cx="75" cy="5" r="12" fill="#c4a8d4"/>
    <circle cx="75" cy="5" r="12" fill="url(#pill_grad)" opacity="0.5"/>
  </g>
  <defs>
    <radialGradient id="pill_grad" cx="40%" cy="35%">
      <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
