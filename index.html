<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petfolio</title>
    <meta name="description" content="Your pet's life portfolio">
    <meta property="og:title" content="Petfolio">
    <meta property="og:description" content="Your pet's life portfolio">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .hub-bar { display:flex; gap:8px; align-items:center; padding:8px 16px; background:#1a1a2e; border-bottom:1px solid #333; flex-wrap:wrap; }
        .hub-bar a { color:#90caf9; text-decoration:none; font-size:13px; padding:4px 12px; border-radius:20px; border:1px solid #90caf9; white-space:nowrap; }
        .hub-bar a:hover { background:#90caf9; color:#000; }
        .hub-bar .hub-title { color:#aaa; font-size:12px; margin-right:4px; }
    </style>
</head>
<body class="dark-mode">
    <!-- 허브 네비게이션 바 -->
    <div class="hub-bar">
        <span class="hub-title">🐾 Petfolio</span>
        <a href="index.html">📱 프로토타입 데모</a>
        <a href="apps/admin-web/dist/index.html" target="_blank">⚙️ Admin Web (React)</a>
    </div>

    <!-- 통합 헤더 -->
    <header class="app-bar">
        <div class="brand">
            <span class="logo">Petfolio</span>
        </div>
        <div class="actions">
            <select id="role-selector" class="role-switcher">
                <option value="user">User</option>
                <option value="provider">Provider</option>
                <option value="admin">Admin</option>
            </select>
            <button id="theme-toggle" class="icon-btn">🌓</button>
        </div>
    </header>

    <main class="main-content">
        <!-- 1. ADMIN VIEW (3대 관리 시스템) -->
        <section id="admin-view" class="role-view hidden">
            <div id="admin-content">
                <!-- main.js: renderAdmin() -->
            </div>
        </section>

        <!-- 2. PROVIDER VIEW -->
        <section id="provider-view" class="role-view hidden">
            <div id="provider-content">
                <!-- main.js: renderProvider() -->
            </div>
        </section>

        <!-- 3. USER VIEW -->
        <section id="user-view" class="role-view">
            <div id="user-content">
                <!-- main.js: renderUser() -->
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
