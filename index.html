<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방울아놀자 - Pet Lifetime Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <header>
        <div class="logo">방울아놀자</div>
        <div class="header-actions">
            <select id="lang-selector">
                <option value="ko">한국어</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
                <option value="zh">中文</option>
                <option value="vi">Tiếng Việt</option>
                <option value="id">Bahasa Indonesia</option>
                <option value="th">ไทย</option>
                <option value="es">Español</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
                <option value="it">Italiano</option>
                <option value="pt">Português</option>
                <option value="ar">العربية</option>
            </select>
            <button id="theme-toggle">🌓</button>
        </div>
    </header>

    <main id="app">
        <!-- Pet Profile (Pet-Centric) -->
        <section class="pet-header">
            <div id="pet-profile-container">
                <!-- t('pet', 'identity') -->
            </div>
        </section>

        <!-- Condition & Metrics (Structured Input Only) -->
        <section class="pet-stats-grid">
            <div class="card metrics-card">
                <h3 data-t-domain="pet" data-t-key="metrics">건강 지표</h3>
                <div id="metrics-view"></div>
            </div>
            <div class="card conditions-card">
                <h3 data-t-domain="pet" data-t-key="conditions">기저 질환</h3>
                <div id="conditions-list"></div>
            </div>
        </section>

        <!-- Timeline (Auto-Cumulative) -->
        <section class="timeline-section">
            <h2 data-t-domain="pet" data-t-key="timeline">생애 타임라인</h2>
            <div id="timeline-feed"></div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
