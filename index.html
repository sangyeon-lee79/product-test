<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방울아놀자 - Bang-ul Play</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="dark-mode">
    <!-- 통합 헤더 -->
    <header class="app-bar">
        <div class="brand">
            <span class="logo">방울아놀자</span>
        </div>
        <div class="actions">
            <select id="role-selector" class="role-switcher">
                <option value="user">User</option>
                <option value="provider">Provider</option>
                <option value="admin">Admin</option>
            </select>
            <select id="lang-selector" class="lang-switcher">
                <option value="ko">KO</option><option value="en">EN</option><option value="ja">JA</option><option value="vi">VI</option>
            </select>
            <button id="theme-toggle" class="icon-btn">🌓</button>
        </div>
    </header>

    <main class="main-content">
        <!-- 1. ADMIN VIEW (3대 관리 시스템) -->
        <section id="admin-view" class="role-view hidden">
            <div id="admin-content">
                <!-- main.js: renderAdmin() -->
            </div>
        </section>

        <!-- 2. PROVIDER VIEW -->
        <section id="provider-view" class="role-view hidden">
            <div id="provider-content">
                <!-- main.js: renderProvider() -->
            </div>
        </section>

        <!-- 3. USER VIEW -->
        <section id="user-view" class="role-view">
            <div id="user-content">
                <!-- main.js: renderUser() -->
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
