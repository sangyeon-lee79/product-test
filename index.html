<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방울아놀자 - Global Pet Platform</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="dark-mode">
    <header>
        <div class="logo">방울아놀자</div>
        <div class="header-actions">
            <select id="role-selector">
                <option value="user">User Dashboard</option>
                <option value="provider">Provider Dashboard</option>
                <option value="admin">Master Admin Control</option>
            </select>
            <select id="lang-selector">
                <option value="ko">KO</option><option value="en">EN</option><option value="ja">JA</option>
                <option value="vi">VI</option><option value="id">ID</option><option value="zh">ZH</option>
                <option value="th">TH</option><option value="es">ES</option><option value="fr">FR</option>
                <option value="de">DE</option><option value="it">IT</option><option value="pt">PT</option><option value="ar">AR</option>
            </select>
            <button id="theme-toggle">🌓</button>
        </div>
    </header>

    <main>
        <!-- Distributed API Settings -->
        <section class="card settings-section">
            <h3 data-entity-id="m-label-settings">Personal Translation Settings</h3>
            <div class="input-group">
                <input type="password" id="user-api-key" placeholder="Google API Key for zero-cost translation">
                <button id="save-api-key-btn">Save Key</button>
            </div>
        </section>

        <!-- 1. MASTER ADMIN DASHBOARD (복구) -->
        <section id="admin-view" class="role-view hidden">
            <h2 data-entity-id="m-menu-001">Master Admin Control</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="label" data-entity-id="m-stat-users">Total Users</span>
                    <span class="value">1,240</span>
                </div>
                <div class="stat-card">
                    <span class="label" data-entity-id="m-stat-pets">Total Pets</span>
                    <span class="value">850</span>
                </div>
                <div class="stat-card">
                    <span class="label" data-entity-id="m-stat-bookings">Bookings</span>
                    <span class="value">320</span>
                </div>
            </div>

            <div class="card master-studio">
                <h3 data-entity-id="m-label-studio">Master Data Studio</h3>
                <div class="studio-actions">
                    <select id="master-domain-selector">
                        <option value="breed">Breeds</option>
                        <option value="industry">Industries</option>
                    </select>
                    <div class="input-group">
                        <input type="text" id="admin-master-input" placeholder="New Master Item...">
                        <button id="admin-convert-btn" class="globe-btn">🌐 Add & Translate</button>
                    </div>
                </div>
                <div id="master-items-table" class="master-list"></div>
            </div>
        </section>

        <!-- 2. PROVIDER DASHBOARD -->
        <section id="provider-view" class="role-view hidden">
            <h2 data-entity-id="m-label-provider">Provider Dashboard</h2>
            <div class="card registration-form">
                <h3 data-entity-id="m-label-shop-reg">Shop Registration</h3>
                
                <!-- Rule 3: Dropdown from Master Menu -->
                <div class="input-container">
                    <label>Industry Category</label>
                    <select id="provider-industry-select" class="dropdown-master">
                        <!-- Populated via JS from industry master list -->
                    </select>
                </div>

                <div class="input-group">
                    <input type="text" id="provider-shop-input" placeholder="Enter your shop name...">
                    <button id="provider-convert-btn" class="globe-btn">🌐 Translate</button>
                </div>
                <div id="provider-conversion-preview" class="hidden">
                    <div id="provider-grid-items" class="conversion-grid"></div>
                    <button id="save-shop-btn" class="save-btn">Publish Shop Profile</button>
                </div>
            </div>
        </section>

        <!-- 3. USER DASHBOARD (복구) -->
        <section id="user-view" class="role-view">
            <h2 data-entity-id="m-label-user">User Timeline</h2>
            <div id="pet-profile-container"></div>
            <nav class="category-filter" id="user-category-list"></nav>
            <div class="timeline-container">
                <div class="timeline-line"></div>
                <div id="timeline-feed"></div>
            </div>
        </section>
    </main>

    <!-- UNIVERSAL EDITOR MODAL -->
    <div id="universal-modal" class="modal hidden">
        <div class="modal-content card">
            <h3>🌐 Edit Universal Translations (13 Langs)</h3>
            <div id="modal-grid-items" class="conversion-grid"></div>
            <div class="modal-footer">
                <button id="save-modal-btn" class="save-btn">Save Changes</button>
                <button onclick="document.getElementById('universal-modal').classList.add('hidden')" class="cancel-btn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
