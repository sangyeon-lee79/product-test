<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방울아놀자 - Bang-ul Play</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="dark-mode">
    <!-- APP BAR (Unified Shell) -->
    <header class="app-bar">
        <div class="brand">
            <span class="logo" data-ui-key="app_logo"></span>
        </div>
        <div class="actions">
            <select id="role-selector" class="role-switcher">
                <option value="user" data-ui-key="role_user"></option>
                <option value="provider" data-ui-key="role_provider"></option>
                <option value="admin" data-ui-key="role_admin"></option>
            </select>
            <select id="lang-selector" class="lang-switcher">
                <option value="ko">KO</option><option value="en">EN</option><option value="ja">JA</option>
                <option value="vi">VI</option><option value="id">ID</option><option value="zh">ZH</option>
                <option value="th">TH</option><option value="es">ES</option><option value="fr">FR</option>
                <option value="de">DE</option><option value="it">IT</option><option value="pt">PT</option><option value="ar">AR</option>
            </select>
            <button id="theme-toggle" class="icon-btn">🌓</button>
        </div>
    </header>

    <main class="main-content">
        <!-- 1. USER VIEW (Pet Owner) -->
        <section id="user-view" class="role-view">
            <div id="user-content">
                <!-- Dynamically Rendered by main.js -->
            </div>
        </section>

        <!-- 2. PROVIDER VIEW (Store Owner) -->
        <section id="provider-view" class="role-view hidden">
            <div id="provider-content">
                <!-- Dynamically Rendered by main.js -->
            </div>
        </section>

        <!-- 3. ADMIN VIEW (System Master) -->
        <section id="admin-view" class="role-view hidden">
            <div id="admin-content">
                <!-- Dynamically Rendered by main.js -->
            </div>
        </section>
    </main>

    <!-- UNIVERSAL EDITOR MODAL (Rules v2) -->
    <div id="universal-modal" class="modal hidden">
        <div class="modal-content card">
            <h3 data-ui-key="modal_edit_title"></h3>
            <div id="modal-grid-items" class="conversion-grid"></div>
            <div class="modal-footer">
                <button id="save-modal-btn" class="save-btn" data-ui-key="btn_save"></button>
                <button onclick="document.getElementById('universal-modal').classList.add('hidden')" class="cancel-btn" data-ui-key="btn_cancel">Cancel</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
