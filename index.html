<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방울아놀자 - Pet Lifetime Platform</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="dark-mode">
    <header>
        <div class="logo">방울아놀자</div>
        <div class="header-actions">
            <select id="lang-selector">
                <option value="ko">한국어</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
                <option value="zh">中文</option>
                <option value="vi">Tiếng Việt</option>
                <option value="id">Bahasa Indonesia</option>
                <option value="th">ไทย</option>
                <option value="es">Español</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
                <option value="it">Italiano</option>
                <option value="pt">Português</option>
                <option value="ar">العربية</option>
            </select>
            <button id="theme-toggle" aria-label="Toggle Theme">🌓</button>
        </div>
    </header>

    <main>
        <!-- Pet Profile Card (SNS Style) -->
        <section class="pet-profile">
            <div id="pet-profile-container">
                <!-- main.js에서 렌더링 -->
            </div>
        </section>

        <!-- Category Filter (SNS Style) -->
        <nav class="category-filter">
            <button class="active" data-category="all" data-t-domain="pet" data-t-key="filter_all">All</button>
            <button data-category="medical" data-t-domain="pet" data-t-key="filter_medical">Medical</button>
            <button data-category="grooming" data-t-domain="pet" data-t-key="filter_grooming">Grooming</button>
            <button data-category="hotel" data-t-domain="pet" data-t-key="filter_hotel">Hotel</button>
            <button data-category="training" data-t-domain="pet" data-t-key="filter_training">Training</button>
            <button data-category="shop" data-t-domain="pet" data-t-key="filter_shop">Shop</button>
        </nav>

        <!-- Timeline Feed (SNS Style) -->
        <section class="timeline-container">
            <div class="timeline-line"></div>
            <div id="timeline-feed">
                <!-- main.js에서 렌더링 -->
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
