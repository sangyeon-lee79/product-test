<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방울아놀자 - Pet Lifetime Platform</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="dark-mode">
    <header>
        <div class="logo">방울아놀자</div>
        <div class="header-actions">
            <select id="role-selector">
                <option value="user">User View</option>
                <option value="provider">Provider (Shop) Reg</option>
                <option value="admin">Admin (Master) Reg</option>
            </select>
            <select id="lang-selector">
                <option value="ko">KO</option>
                <option value="en">EN</option>
                <option value="ja">JA</option>
                <option value="vi">VI</option>
                <!-- ... other langs -->
            </select>
            <button id="theme-toggle">🌓</button>
        </div>
    </header>

    <main>
        <!-- 1. ADMIN/PROVIDER REGISTRATION (Data Input Level) -->
        <section id="registration-view" class="hidden">
            <div class="card registration-form">
                <h2 id="reg-title">Data Registration</h2>
                
                <!-- Universal Conversion Input -->
                <div class="input-container">
                    <label id="input-label">Name</label>
                    <div class="input-group">
                        <input type="text" id="master-input" placeholder="Enter text to register...">
                        <button id="convert-btn" class="globe-btn">🌐</button>
                    </div>
                </div>

                <!-- Conversion Preview (13 Langs) -->
                <div id="conversion-preview" class="hidden">
                    <div id="conversion-grid-items"></div>
                    <button id="save-master-btn" class="save-btn">Save to Global System</button>
                </div>
            </div>
        </section>

        <!-- 2. USER VIEW (Data Consumption Level) -->
        <section id="user-view">
            <!-- Pet Profile -->
            <div id="pet-profile-container"></div>

            <!-- Selection-Based Feed Filter -->
            <nav class="category-filter" id="master-category-list">
                <!-- Admin이 등록한 카테고리가 버튼으로 자동 렌더링됨 -->
            </nav>

            <!-- Timeline Feed -->
            <section class="timeline-container">
                <div class="timeline-line"></div>
                <div id="timeline-feed"></div>
            </section>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
