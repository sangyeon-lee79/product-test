<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방울아놀자 - Pet Lifetime Platform</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="dark-mode">
    <header>
        <div class="logo">방울아놀자</div>
        <div class="header-actions">
            <select id="role-selector">
                <option value="user">User View</option>
                <option value="admin">Master Admin Control</option>
            </select>
            <select id="lang-selector">
                <option value="ko">KO</option>
                <option value="en">EN</option>
                <option value="ja">JA</option>
                <option value="vi">VI</option>
                <option value="id">ID</option>
                <option value="zh">ZH</option>
                <option value="th">TH</option>
                <option value="es">ES</option>
                <option value="fr">FR</option>
                <option value="de">DE</option>
                <option value="it">IT</option>
                <option value="pt">PT</option>
                <option value="ar">AR</option>
            </select>
            <button id="theme-toggle">🌓</button>
        </div>
    </header>

    <main>
        <!-- Distributed API Settings (OFFLOAD COST) -->
        <section class="card settings-section">
            <h3>Personal Translation Settings</h3>
            <div class="input-group">
                <input type="password" id="user-api-key" placeholder="Enter your Google Cloud API Key">
                <button id="save-api-key-btn">Save Key</button>
            </div>
            <p class="hint">Your key is used only in your browser to avoid platform costs.</p>
        </section>

        <!-- 1. MASTER ADMIN VIEW -->
        <section id="admin-view" class="hidden">
            <h2 data-entity-id="m-menu-001">Master Data Studio</h2>
            
            <div class="card studio-controls">
                <div class="studio-actions">
                    <select id="master-domain-selector">
                        <option value="breed">Breeds</option>
                        <option value="condition">Conditions</option>
                    </select>
                    <div class="input-group">
                        <input type="text" id="admin-master-input" placeholder="New Item Name...">
                        <button id="admin-convert-btn" class="globe-btn">🌐 Add & Translate</button>
                    </div>
                </div>
                <div id="master-items-table" class="master-list"></div>
            </div>

            <h2 data-entity-id="m-menu-002">Users</h2>
            <div class="card">User list would appear here with Edit buttons...</div>

            <h2 data-entity-id="m-menu-003">Pets</h2>
            <div class="card">Pet list would appear here with Edit buttons...</div>
        </section>

        <!-- 2. USER VIEW -->
        <section id="user-view">
            <div id="timeline-feed"></div>
        </section>
    </main>

    <!-- UNIVERSAL EDITOR MODAL (Rules v2) -->
    <div id="universal-modal" class="modal hidden">
        <div class="modal-content card">
            <h3>🌐 Edit Universal Translations (13 Langs)</h3>
            <div id="modal-grid-items" class="conversion-grid"></div>
            <div class="modal-footer">
                <button id="save-modal-btn" class="save-btn">Update All Languages</button>
                <button onclick="document.getElementById('universal-modal').classList.add('hidden')" class="cancel-btn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
