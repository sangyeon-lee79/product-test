services:
  postgres:
    image: postgres:16-alpine
    container_name: petfolio-postgres
    environment:
      POSTGRES_DB: petfolio
      POSTGRES_USER: petfolio
      POSTGRES_PASSWORD: petfolio_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./services/api/src/db/pg-schema:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petfolio -d petfolio"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
