name: Deploy to Cloudflare

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────
  # Admin Web → Cloudflare Pages
  # ─────────────────────────────────────
  deploy-admin-web:
    name: Deploy Admin Web (Pages)
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/admin-web/package-lock.json

      - name: Check secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "❌ CLOUDFLARE_API_TOKEN 미설정"
            exit 1
          else
            echo "✅ CLOUDFLARE_API_TOKEN 설정됨 (길이: ${#CLOUDFLARE_API_TOKEN})"
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "❌ CLOUDFLARE_ACCOUNT_ID 미설정"
            exit 1
          else
            echo "✅ CLOUDFLARE_ACCOUNT_ID: $CLOUDFLARE_ACCOUNT_ID"
          fi

      - name: Install dependencies
        working-directory: apps/admin-web
        run: npm ci

      - name: Build
        working-directory: apps/admin-web
        run: npm run build

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Check auth
        run: wrangler whoami

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy apps/admin-web/dist --project-name=pet-life-admin --branch=main

  # ─────────────────────────────────────
  # API → Cloudflare Workers
  # ─────────────────────────────────────
  deploy-api:
    name: Deploy API (Workers)
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/api/package-lock.json

      - name: Check secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "❌ CLOUDFLARE_API_TOKEN 미설정"
            exit 1
          else
            echo "✅ CLOUDFLARE_API_TOKEN 설정됨 (길이: ${#CLOUDFLARE_API_TOKEN})"
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "❌ CLOUDFLARE_ACCOUNT_ID 미설정"
            exit 1
          else
            echo "✅ CLOUDFLARE_ACCOUNT_ID: $CLOUDFLARE_ACCOUNT_ID"
          fi

      - name: Install dependencies
        working-directory: services/api
        run: npm ci

      - name: Check auth
        working-directory: services/api
        run: npx wrangler whoami

      - name: Apply D1 Migrations
        working-directory: services/api
        run: npx wrangler d1 migrations apply pet-life-db --remote

      - name: Deploy to Cloudflare Workers
        working-directory: services/api
        run: npx wrangler deploy
