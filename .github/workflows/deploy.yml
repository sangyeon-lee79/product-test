name: Deploy to Cloudflare

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────
  # Admin Web → Cloudflare Pages
  # ─────────────────────────────────────
  deploy-admin-web:
    name: Deploy Admin Web (Pages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/admin-web/package-lock.json

      - name: Install dependencies
        working-directory: apps/admin-web
        run: npm ci

      - name: Build
        working-directory: apps/admin-web
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=pet-life-admin --directory=apps/admin-web/dist

  # ─────────────────────────────────────
  # API → Cloudflare Workers
  # ─────────────────────────────────────
  deploy-api:
    name: Deploy API (Workers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/api/package-lock.json

      - name: Install dependencies
        working-directory: services/api
        run: npm ci

      - name: Apply D1 Migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: services/api
          command: d1 migrations apply pet-life-db --remote

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: services/api
          command: deploy
