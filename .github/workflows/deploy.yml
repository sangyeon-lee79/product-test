name: Deploy to Cloudflare

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────
  # Admin Web → Cloudflare Pages
  # ─────────────────────────────────────
  deploy-admin-web:
    name: Deploy Admin Web (Pages)
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/admin-web/package-lock.json

      - name: Check secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "❌ CLOUDFLARE_API_TOKEN 미설정"
            exit 1
          else
            echo "✅ CLOUDFLARE_API_TOKEN 설정됨 (길이: ${#CLOUDFLARE_API_TOKEN})"
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "❌ CLOUDFLARE_ACCOUNT_ID 미설정"
            exit 1
          else
            echo "✅ CLOUDFLARE_ACCOUNT_ID: $CLOUDFLARE_ACCOUNT_ID"
          fi

      - name: Install dependencies
        working-directory: apps/admin-web
        run: npm ci

      - name: Build
        working-directory: apps/admin-web
        run: npm run build
        env:
          VITE_API_URL: https://pet-life-api.adrien-lee.workers.dev

      - name: Install wrangler
        run: npm install -g wrangler@4.71.0

      - name: Check auth
        run: wrangler whoami

      - name: Create Pages project (최초 1회)
        run: wrangler pages project create pet-life-admin --production-branch=main || true

      - name: Deploy to Cloudflare Pages (with retry)
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "🚀 Pages deploy attempt ${attempt}/3"
            if wrangler pages deploy apps/admin-web/dist --project-name=pet-life-admin --branch=main; then
              echo "✅ Pages deploy succeeded"
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep_seconds=$((attempt * 20))
              echo "⚠️ Deploy failed. Retry in ${sleep_seconds}s..."
              sleep "$sleep_seconds"
            fi
          done
          echo "❌ Pages deploy failed after 3 attempts."
          echo "Recent wrangler logs:"
          ls -1t "$HOME/.config/.wrangler/logs/" 2>/dev/null | head -n 3 || true
          exit 1

  # ─────────────────────────────────────
  # API → Cloudflare Workers
  # ─────────────────────────────────────
  deploy-api:
    name: Deploy API (Workers)
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/api/package-lock.json

      - name: Check secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "❌ CLOUDFLARE_API_TOKEN 미설정"
            exit 1
          else
            echo "✅ CLOUDFLARE_API_TOKEN 설정됨 (길이: ${#CLOUDFLARE_API_TOKEN})"
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "❌ CLOUDFLARE_ACCOUNT_ID 미설정"
            exit 1
          else
            echo "✅ CLOUDFLARE_ACCOUNT_ID: $CLOUDFLARE_ACCOUNT_ID"
          fi

      - name: Install dependencies
        working-directory: services/api
        run: npm ci

      - name: Install wrangler
        run: npm install -g wrangler@4.71.0

      - name: Check auth
        working-directory: services/api
        run: wrangler whoami

      - name: Apply PostgreSQL Migrations
        working-directory: services/api
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          set -euo pipefail

          # Create migration tracking table if not exists
          psql "$NEON_DATABASE_URL" -v ON_ERROR_STOP=on -c "
            CREATE TABLE IF NOT EXISTS schema_migrations (
              filename TEXT PRIMARY KEY,
              applied_at TIMESTAMPTZ DEFAULT NOW()
            );
          "

          # Apply each migration file in order
          for file in src/db/pg-schema/*.sql; do
            fname=$(basename "$file")
            already=$(psql "$NEON_DATABASE_URL" -v ON_ERROR_STOP=on -tAc \
              "SELECT 1 FROM schema_migrations WHERE filename = '$fname';")
            if [ "$already" = "1" ]; then
              echo "⏭️  Already applied: $fname"
            else
              echo "🚀 Applying: $fname"
              psql "$NEON_DATABASE_URL" -v ON_ERROR_STOP=on -f "$file"
              psql "$NEON_DATABASE_URL" -v ON_ERROR_STOP=on -c \
                "INSERT INTO schema_migrations (filename) VALUES ('$fname');"
              echo "✅ Applied: $fname"
            fi
          done

      - name: Deploy to Cloudflare Workers (with retry)
        working-directory: services/api
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "🚀 Workers deploy attempt ${attempt}/3"
            if wrangler deploy --env=""; then
              echo "✅ Workers deploy succeeded"
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep_seconds=$((attempt * 20))
              echo "⚠️ Deploy failed. Retry in ${sleep_seconds}s..."
              sleep "$sleep_seconds"
            fi
          done
          echo "❌ Workers deploy failed after 3 attempts."
          echo "Recent wrangler logs:"
          ls -1t "$HOME/.config/.wrangler/logs/" 2>/dev/null | head -n 3 || true
          exit 1
