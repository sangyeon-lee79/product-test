name: Deploy to Cloudflare

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────
  # Admin Web → Cloudflare Pages
  # ─────────────────────────────────────
  deploy-admin-web:
    name: Deploy Admin Web (Pages)
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/admin-web/package-lock.json

      - name: Check secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "❌ CLOUDFLARE_API_TOKEN 미설정"
            exit 1
          else
            echo "✅ CLOUDFLARE_API_TOKEN 설정됨 (길이: ${#CLOUDFLARE_API_TOKEN})"
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "❌ CLOUDFLARE_ACCOUNT_ID 미설정"
            exit 1
          else
            echo "✅ CLOUDFLARE_ACCOUNT_ID: $CLOUDFLARE_ACCOUNT_ID"
          fi

      - name: Install dependencies
        working-directory: apps/admin-web
        run: npm ci

      - name: Build
        working-directory: apps/admin-web
        run: npm run build
        env:
          VITE_API_URL: https://pet-life-api.adrien-lee.workers.dev

      - name: Install wrangler
        run: npm install -g wrangler@4.71.0

      - name: Check auth
        run: wrangler whoami

      - name: Create Pages project (최초 1회)
        run: wrangler pages project create pet-life-admin --production-branch=main || true

      - name: Deploy to Cloudflare Pages (with retry)
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "🚀 Pages deploy attempt ${attempt}/3"
            if wrangler pages deploy apps/admin-web/dist --project-name=pet-life-admin --branch=main; then
              echo "✅ Pages deploy succeeded"
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep_seconds=$((attempt * 20))
              echo "⚠️ Deploy failed. Retry in ${sleep_seconds}s..."
              sleep "$sleep_seconds"
            fi
          done
          echo "❌ Pages deploy failed after 3 attempts."
          echo "Recent wrangler logs:"
          ls -1t "$HOME/.config/.wrangler/logs/" 2>/dev/null | head -n 3 || true
          exit 1

  # ─────────────────────────────────────
  # API → Cloudflare Workers
  # ─────────────────────────────────────
  deploy-api:
    name: Deploy API (Workers)
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/api/package-lock.json

      - name: Check secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "❌ CLOUDFLARE_API_TOKEN 미설정"
            exit 1
          else
            echo "✅ CLOUDFLARE_API_TOKEN 설정됨 (길이: ${#CLOUDFLARE_API_TOKEN})"
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "❌ CLOUDFLARE_ACCOUNT_ID 미설정"
            exit 1
          else
            echo "✅ CLOUDFLARE_ACCOUNT_ID: $CLOUDFLARE_ACCOUNT_ID"
          fi

      - name: Install dependencies
        working-directory: services/api
        run: npm ci

      - name: Install wrangler
        run: npm install -g wrangler@4.71.0

      - name: Check auth
        working-directory: services/api
        run: wrangler whoami

      - name: Apply PostgreSQL Migrations
        working-directory: services/api
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${NEON_DATABASE_URL:-}" ]; then
            echo "⏭️  NEON_DATABASE_URL not set — skipping migrations"
            exit 0
          fi
          node -e "
            const { neon } = require('@neondatabase/serverless');
            const fs = require('fs');
            const path = require('path');
            (async () => {
              const sql = neon(process.env.NEON_DATABASE_URL);
              const dir = 'src/db/pg-schema';
              const files = fs.readdirSync(dir).filter(f => f.endsWith('.sql')).sort();
              for (const file of files) {
                console.log('Applying:', file);
                const content = fs.readFileSync(path.join(dir, file), 'utf-8');
                const stmts = content.replace(/--[^\n]*/g,'').split(/;\s*\n/).map(s=>s.trim()).filter(s=>s);
                for (const stmt of stmts) {
                  await sql.query(stmt + ';');
                }
                console.log('Done:', file);
              }
              console.log('All migrations applied');
            })().catch(e => { console.error(e.message); process.exit(1); });
          "

      - name: Deploy to Cloudflare Workers (with retry)
        working-directory: services/api
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "🚀 Workers deploy attempt ${attempt}/3"
            if wrangler deploy --env=""; then
              echo "✅ Workers deploy succeeded"
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep_seconds=$((attempt * 20))
              echo "⚠️ Deploy failed. Retry in ${sleep_seconds}s..."
              sleep "$sleep_seconds"
            fi
          done
          echo "❌ Workers deploy failed after 3 attempts."
          echo "Recent wrangler logs:"
          ls -1t "$HOME/.config/.wrangler/logs/" 2>/dev/null | head -n 3 || true
          exit 1
